services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
      POSTGRES_DB: expenses
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses -d expenses"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.expenses-api.entrypoints=websecure"
      - "traefik.http.routers.expenses-api.rule=Host(`expenses.app-jba.ovh`) && PathPrefix(`/api`)"
      - "traefik.http.services.expenses-api.loadbalancer.server.port=8000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/.venv
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: https://expenses.app-jba.ovh
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.expenses-front.entrypoints=websecure"
      - "traefik.http.routers.expenses-front.rule=Host(`expenses.app-jba.ovh`)"
      - "traefik.http.services.expenses-front.loadbalancer.server.port=3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  proxy:
    external: true

volumes:
  postgres_data: